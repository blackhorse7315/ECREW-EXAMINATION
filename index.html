      );
    }

    function ExamRunner({ appUser, assignments, questions, setView, showToast, fetchSheetData, refreshData }) {
      const assignment = assignments.find(a => (a.userId === appUser.id || a.userId === appUser.username) && a.status === 'pending');
      
      // Filter soal berdasar Type Rating AND Type Exam AND Model Soal
      const examQuestions = questions.filter(q => 
        q.typeRating === (assignment?.typeRating || '') && 
        (!assignment?.typeExam || q.typeExam === assignment.typeExam) && 
        (!assignment?.modelSoal || q.modelSoal === assignment.modelSoal)
      );
      
      const [answers, setAnswers] = useState({});
      const [isSubmitting, setIsSubmitting] = useState(false);

      if (!assignment) {
        return (
          <div className="text-center py-20">
            <h2 className="text-2xl font-bold text-slate-800">Ujian tidak ditemukan</h2>
            <button onClick={() => setView('user')} className="mt-4 text-blue-600 underline">Kembali ke Dashboard</button>
          </div>
        );
      }

      if (examQuestions.length === 0) {
        return (
          <div className="text-center py-20 bg-white rounded-xl shadow p-8 max-w-2xl mx-auto border border-red-200">
            <div className="flex justify-center mb-4"><Icon name="circle-exclamation" size={48} className="text-red-500" /></div>
            <h2 className="text-2xl font-bold text-slate-800">Soal Belum Tersedia</h2>
            <p className="text-slate-600 mt-2">Ujian untuk Type Rating {assignment.typeRating} belum memiliki soal di database. Silakan hubungi Administrator.</p>
            <button onClick={() => setView('user')} className="mt-6 bg-slate-900 text-white px-6 py-2 rounded font-bold">Kembali</button>
          </div>
        );
      }

      const handleSubmit = async () => {
        if (Object.keys(answers).length < examQuestions.length) {
          if (!window.confirm('Ada soal yang belum dijawab. Yakin ingin mengumpulkan?')) return;
        }

        setIsSubmitting(true);
        let correct = 0;
        examQuestions.forEach(q => {
          const questionId = q.id || q.text; 
          if (answers[questionId] === q.correctAnswer?.trim().toUpperCase()) correct++;
        });
        
        const score = (correct / examQuestions.length) * 100;

        try {
          await fetchSheetData('submitExam', { id: assignment.id, status: 'completed', score: score.toFixed(0), completedAt: new Date().toISOString() });
          showToast(`Ujian Selesai! Nilai Anda: ${score.toFixed(0)}`, 'success');
          refreshData();
          setView('user');
        } catch (err) {
          showToast('Gagal mengirim hasil ujian', 'error');
        } finally {
           setIsSubmitting(false);
        }
      };

      return (
        <div className="max-w-4xl mx-auto animate-fade-in-up">
          <div className="bg-slate-900 text-white p-6 rounded-t-xl sticky top-0 z-20 shadow-md flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
              <h2 className="text-xl font-bold uppercase tracking-wide">
                Exam: <span className="text-yellow-500">{assignment.typeRating} - {assignment.typeExam}</span> <span className="text-sm opacity-80">({assignment.modelSoal})</span>
              </h2>
              <p className="text-sm text-slate-300 mt-1">Kandidat: {appUser.name} | Lisensi: {appUser.licenceNo}</p>
            </div>
            <div className="bg-slate-800 px-4 py-2 rounded-lg border border-slate-700 flex items-center gap-2 font-bold text-sm">
              <span>Progres:</span>
              <span className="text-blue-400">{Object.keys(answers).length} / {examQuestions.length}</span>
            </div>
          </div>

          <div className="bg-slate-50 p-6 sm:p-8 border-x border-b border-slate-200 rounded-b-xl shadow-sm mb-10 space-y-8">
            {(() => {
              let currentSectionDisplay = null;
              return examQuestions.map((q, idx) => {
                const qId = q.id || q.text;
                const showSection = q.section && q.section !== currentSectionDisplay;
                if (showSection) currentSectionDisplay = q.section;

                return (
                  <React.Fragment key={qId}>
                    {showSection && q.section !== 'General' && (
                      <div className="col-span-full pt-4 pb-2 border-b-2 border-slate-300 mt-2">
                        <h3 className="text-xl font-bold text-slate-800 uppercase tracking-wide">{q.section}</h3>
                      </div>
                    )}
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 relative overflow-hidden">
                       {answers[qId] && (
                         <div className="absolute top-0 right-0 bg-green-500 text-white p-2 rounded-bl-lg flex items-center justify-center">
                           <Icon name="circle-check" size={16} />
                         </div>
                       )}
                      <h3 className="text-lg font-semibold text-slate-800 mb-4 flex gap-3">
                        <span className="text-slate-400 font-bold">{idx + 1}.</span> 
                        <span>{q.text}</span>
                      </h3>
                      <div className="space-y-3 pl-8">
                        {['A', 'B', 'C', 'D'].map((opt) => (
                          <label key={opt} className={`flex items-center gap-4 p-3 rounded-lg border-2 cursor-pointer transition-colors ${answers[qId] === opt ? 'border-blue-500 bg-blue-50/50' : 'border-slate-100 hover:border-blue-200 hover:bg-slate-50'}`}>
                            <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center shrink-0 ${answers[qId] === opt ? 'border-blue-500' : 'border-slate-300'}`}>
                              {answers[qId] === opt && <div className="w-3 h-3 bg-blue-500 rounded-full"></div>}
                            </div>
                            <span className="font-bold text-slate-600 w-6">{opt}.</span>
                            <span className="text-slate-800">{q[`opt${opt}`]}</span>
                            <input type="radio" name={`q-${qId}`} value={opt} className="hidden" onChange={() => setAnswers({...answers, [qId]: opt})} />
                          </label>
                        ))}
                      </div>
                    </div>
                  </React.Fragment>
                );
              });
            })()}

            <div className="pt-6 border-t border-slate-200 flex justify-end">
              <button onClick={handleSubmit} disabled={isSubmitting} className="bg-green-600 text-white font-bold py-3 px-8 rounded-xl hover:bg-green-700 transition-colors shadow-lg hover:shadow-xl disabled:opacity-50 text-lg flex items-center gap-2">
                {isSubmitting ? 'Mengirim...' : <><Icon name="square-check" size={24}/> Selesai & Kumpulkan</>}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // Render ke DOM
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
