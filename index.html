<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-CREW Exam System</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome untuk Ikon -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- React & ReactDOM (Standalone) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  
  <!-- Babel untuk menerjemahkan JSX di dalam browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Custom Animations */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up {
      animation: fadeInUp 0.4s ease-out forwards;
    }
  </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800">
  <div id="root">
    <div class="min-h-screen flex flex-col items-center justify-center bg-slate-50 gap-4">
      <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-slate-900"></div>
      <p class="text-slate-600 font-medium">Memuat Aplikasi...</p>
    </div>
  </div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Helper Component untuk Ikon menggunakan FontAwesome
    const Icon = ({ name, size = 16, className = "" }) => (
      <i className={`fa-solid fa-${name} ${className}`} style={{ fontSize: `${size}px` }}></i>
    );

    // ==========================================
    // KONFIGURASI GOOGLE SHEETS
    // ==========================================
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzsqx9f-oFwgGp1kBirRxdmBTWYk7eJYfT3jLWVkGVqgw1hY577dHUawhW3x3_KDj3yDQ/exec"; 

    // --- CONSTANTS ---
    const TYPE_RATINGS = ['GIV', 'BE300', 'CA212', 'B412', 'AW109'];
    const RANKS = ['CCP', 'FI', 'GI', 'Capt', 'FO'];

    function App() {
      // State Aplikasi
      const [isLoading, setIsLoading] = useState(true);
      const [appUser, setAppUser] = useState(null);
      const [view, setView] = useState('login');

      // Data State
      const [users, setUsers] = useState([]);
      const [questions, setQuestions] = useState([]);
      const [assignments, setAssignments] = useState([]);

      // Toast State
      const [toast, setToast] = useState({ show: false, message: '', type: 'info' });

      // --- GOOGLE SHEETS API SERVICE ---
      const fetchSheetData = async (action, payload = null) => {
        if (!GOOGLE_SCRIPT_URL) {
          return new Promise((resolve) => {
            setTimeout(() => {
              let data;
              if (action === 'getUsers') data = JSON.parse(localStorage.getItem('sheet_users') || '[]');
              if (action === 'getQuestions') data = JSON.parse(localStorage.getItem('sheet_questions') || '[]');
              if (action === 'getAssignments') data = JSON.parse(localStorage.getItem('sheet_assignments') || '[]');
              
              if (action === 'registerUser') {
                const current = JSON.parse(localStorage.getItem('sheet_users') || '[]');
                payload.id = Date.now().toString();
                current.push(payload);
                localStorage.setItem('sheet_users', JSON.stringify(current));
                data = { success: true };
              }
              if (action === 'logLogin') data = { success: true };
              if (action === 'addQuestion') {
                const current = JSON.parse(localStorage.getItem('sheet_questions') || '[]');
                payload.id = Date.now().toString();
                current.push(payload);
                localStorage.setItem('sheet_questions', JSON.stringify(current));
                data = { success: true };
              }
              if (action === 'deleteQuestion') {
                const current = JSON.parse(localStorage.getItem('sheet_questions') || '[]');
                const filtered = current.filter(q => q.id !== payload.id);
                localStorage.setItem('sheet_questions', JSON.stringify(filtered));
                data = { success: true };
              }
              if (action === 'deleteAllQuestions') {
                localStorage.setItem('sheet_questions', '[]');
                data = { success: true };
              }
              if (action === 'deleteQuestionGroup') {
                const current = JSON.parse(localStorage.getItem('sheet_questions') || '[]');
                const filtered = current.filter(q => !(q.typeRating === payload.typeRating && q.typeExam === payload.typeExam && q.modelSoal === payload.modelSoal));
                localStorage.setItem('sheet_questions', JSON.stringify(filtered));
                data = { success: true };
              }
              if (action === 'updateQuestion') {
                const current = JSON.parse(localStorage.getItem('sheet_questions') || '[]');
                const index = current.findIndex(q => q.id === payload.id);
                if (index > -1) {
                  current[index] = { ...current[index], ...payload };
                  localStorage.setItem('sheet_questions', JSON.stringify(current));
                }
                data = { success: true };
              }
              if (action === 'deleteUser') {
                const current = JSON.parse(localStorage.getItem('sheet_users') || '[]');
                const filtered = current.filter(u => u.id !== payload.id);
                localStorage.setItem('sheet_users', JSON.stringify(filtered));
                data = { success: true };
              }
              if (action === 'updateUser') {
                const current = JSON.parse(localStorage.getItem('sheet_users') || '[]');
                const index = current.findIndex(u => u.id === payload.id);
                if (index > -1) {
                  current[index] = { ...current[index], ...payload };
                  localStorage.setItem('sheet_users', JSON.stringify(current));
                }
                data = { success: true };
              }
              if (action === 'addAssignment') {
                const current = JSON.parse(localStorage.getItem('sheet_assignments') || '[]');
                payload.id = Date.now().toString();
                current.push(payload);
                localStorage.setItem('sheet_assignments', JSON.stringify(current));
                data = { success: true };
              }
              if (action === 'submitExam') {
                const current = JSON.parse(localStorage.getItem('sheet_assignments') || '[]');
                const index = current.findIndex(a => a.id === payload.id);
                if(index > -1) {
                  current[index] = { ...current[index], ...payload };
                  localStorage.setItem('sheet_assignments', JSON.stringify(current));
                }
                data = { success: true };
              }
              resolve(data);
            }, 100); 
          });
        }

        try {
          let url = `${GOOGLE_SCRIPT_URL}?action=${action}`;
          let options = { method: 'GET' };

          if (payload) {
            options = {
              method: 'POST',
              headers: { 'Content-Type': 'text/plain;charset=utf-8' },
              body: JSON.stringify(payload)
            };
          }

          const response = await fetch(url, options);
          const result = await response.json();
          return result;
        } catch (error) {
          console.error("Error fetching Google Sheets:", error);
          throw error;
        }
      };

      const loadInitialData = async () => {
        // Cek Cache Lokal agar loading terasa instan (Stale-while-revalidate)
        const cachedUsers = JSON.parse(localStorage.getItem('cache_users'));
        const cachedQuestions = JSON.parse(localStorage.getItem('cache_questions'));
        const cachedAssignments = JSON.parse(localStorage.getItem('cache_assignments'));

        if (cachedUsers && cachedQuestions && cachedAssignments) {
          setUsers(cachedUsers);
          setQuestions(cachedQuestions);
          setAssignments(cachedAssignments);
          setIsLoading(false); // Langsung hilangkan layar loading
        } else {
          setIsLoading(true);
        }

        try {
          const [fetchedUsers, fetchedQuestions, fetchedAssignments] = await Promise.all([
            fetchSheetData('getUsers'),
            fetchSheetData('getQuestions'),
            fetchSheetData('getAssignments')
          ]);
          
          // Standarisasi key (Mengatasi perbedaan nama header di Spreadsheet seperti "Correct Answer" vs "correctAnswer")
          const stdQuestions = (fetchedQuestions || []).map(q => ({
            ...q,
            correctAnswer: (q.correctAnswer || q['Correct Answer'] || q.jawaban || q.Jawaban || q['Kunci Jawaban'] || '').toString().trim().toUpperCase(),
            optA: q.optA || q.opta || q['Opt A'] || q.opsiA || q['Opsi A'] || '',
            optB: q.optB || q.optb || q['Opt B'] || q.opsiB || q['Opsi B'] || '',
            optC: q.optC || q.optc || q['Opt C'] || q.opsiC || q['Opsi C'] || '',
            optD: q.optD || q.optd || q['Opt D'] || q.opsiD || q['Opsi D'] || '',
            text: q.text || q.Text || q.pertanyaan || q.Pertanyaan || q.Soal || q.soal || '',
            typeRating: q.typeRating || q['Type Rating'] || q.typerating || '',
            typeExam: q.typeExam || q['Type Exam'] || q.typeexam || 'Initial',
            modelSoal: q.modelSoal || q['Model Soal'] || q.modelsoal || 'MODEL A',
            section: q.section || q.Section || q.bagian || 'General'
          }));

          setUsers(fetchedUsers || []);
          setQuestions(stdQuestions);
          setAssignments(fetchedAssignments || []);

          // Simpan pembaruan ke cache untuk kunjungan berikutnya
          localStorage.setItem('cache_users', JSON.stringify(fetchedUsers || []));
          localStorage.setItem('cache_questions', JSON.stringify(stdQuestions));
          localStorage.setItem('cache_assignments', JSON.stringify(fetchedAssignments || []));
        } catch (err) {
          if (!cachedUsers) {
            showToast("Gagal memuat data dari Spreadsheet", "error");
          } else {
            console.warn("Menggunakan data dari cache lokal (Offline)");
          }
        } finally {
          setIsLoading(false);
        }
      };

      useEffect(() => {
        loadInitialData();
      }, []);

      const showToast = (message, type = 'info') => {
        setToast({ show: true, message, type });
        setTimeout(() => setToast({ show: false, message: '', type: 'info' }), 3000);
      };

      const handleLogout = () => {
        setAppUser(null);
        setView('login');
      };

      const refreshData = () => {
        loadInitialData();
        showToast("Data disinkronkan dengan Spreadsheet", "success");
      };

      if (isLoading) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 gap-4">
            <div className="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-slate-900"></div>
            <p className="text-slate-600 font-medium animate-pulse">Menghubungkan ke Database...</p>
          </div>
        );
      }

      return (
        <div className="min-h-screen flex flex-col">
          {!GOOGLE_SCRIPT_URL && (
            <div className="bg-yellow-100 text-yellow-800 px-4 py-2 text-xs font-bold text-center flex justify-center items-center gap-2">
              <Icon name="database" size={14} /> 
              MODE SIMULASI OFFLINE AKTIF. Masukkan URL Google Apps Script pada kode untuk menghubungkan.
            </div>
          )}

          {/* HEADER */}
          <header className="bg-slate-900 text-white py-6 shadow-md border-b-4 border-yellow-500">
            <div className="container mx-auto px-4 sm:px-6 lg:px-8 max-w-7xl">
              <div className="flex flex-col md:flex-row items-center justify-between">
                <div className="flex items-center gap-4 mb-4 md:mb-0">
                  <div className="bg-yellow-500 p-3 rounded-lg text-slate-900 flex items-center justify-center">
                    <Icon name="plane-departure" size={32} />
                  </div>
                  <div className="text-center md:text-left">
                    <h1 className="text-2xl font-bold tracking-wide uppercase text-white">
                      E CREW Type Rating Exam
                    </h1>
                    <h2 className="text-sm font-medium text-slate-300">
                      Aircraft Type Rating Examination Platform
                    </h2>
                    <h3 className="text-xs font-semibold text-yellow-500 mt-1 tracking-wider">
                      TRANSWISATA PRIMA AVIATION
                    </h3>
                  </div>
                </div>
                
                {appUser && (
                  <div className="flex items-center gap-4 bg-slate-800 px-4 py-2 rounded-full border border-slate-700">
                    <div className="text-right hidden sm:block">
                      <p className="text-sm font-bold text-white">{appUser.name}</p>
                      <p className="text-xs text-yellow-500 capitalize">{appUser.role}</p>
                    </div>
                    <button 
                      onClick={handleLogout}
                      className="p-2 bg-slate-700 hover:bg-red-600 rounded-full transition-colors text-white"
                      title="Logout"
                    >
                      <Icon name="right-from-bracket" size={18} />
                    </button>
                  </div>
                )}
              </div>
            </div>
          </header>

          {/* MAIN CONTENT AREA */}
          <main className="flex-grow container mx-auto px-4 py-8 max-w-7xl">
            {view === 'login' && <LoginView setView={setView} setAppUser={setAppUser} users={users} showToast={showToast} fetchSheetData={fetchSheetData} />}
            {view === 'register' && <RegisterView setView={setView} users={users} showToast={showToast} fetchSheetData={fetchSheetData} refreshData={refreshData} />}
            {view === 'admin' && ['admin', 'instructor'].includes(appUser?.role) && <AdminDashboard appUser={appUser} users={users} questions={questions} assignments={assignments} showToast={showToast} fetchSheetData={fetchSheetData} refreshData={refreshData} />}
            {view === 'user' && appUser?.role === 'user' && <UserDashboard appUser={appUser} assignments={assignments} setView={setView} />}
            {view === 'exam' && appUser?.role === 'user' && <ExamRunner appUser={appUser} assignments={assignments} questions={questions} setView={setView} showToast={showToast} fetchSheetData={fetchSheetData} refreshData={refreshData} />}
          </main>

          {/* TOAST NOTIFICATION */}
          {toast.show && (
            <div className="fixed bottom-4 right-4 z-50 animate-fade-in-up">
              <div className={`px-6 py-4 rounded-lg shadow-xl flex items-center gap-3 text-white font-medium ${
                toast.type === 'error' ? 'bg-red-600' : 
                toast.type === 'success' ? 'bg-green-600' : 'bg-slate-800'
              }`}>
                {toast.type === 'error' ? <Icon name="circle-exclamation" size={20} /> : <Icon name="circle-check" size={20} />}
                {toast.message}
              </div>
            </div>
          )}
          
          {/* FOOTER */}
          <footer className="bg-slate-900 text-slate-400 py-6 text-center text-sm border-t border-slate-800">
            <p>&copy; {new Date().getFullYear()} Transwisata Prima Aviation. All rights reserved.</p>
            <p className="text-xs mt-1">E-Crew Professional Evaluation System | Linked to Google Sheets</p>
          </footer>
        </div>
      );
    }

    // ==========================================
    // VIEWS
    // ==========================================

    function LoginView({ setView, setAppUser, users, showToast, fetchSheetData }) {
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const [isLoggingIn, setIsLoggingIn] = useState(false);

      const handleLogin = async (e) => {
        e.preventDefault();
        setIsLoggingIn(true);
        
        if (username === 'admin' && password === 'admin123') {
          setAppUser({ role: 'admin', name: 'System Administrator', username: 'admin' });
          setView('admin');
          showToast('Welcome, Administrator', 'success');
          setIsLoggingIn(false);
          return;
        }

        if (username === 'instructor' && password === 'instructor123') {
          setAppUser({ role: 'instructor', name: 'Chief Instructor', username: 'instructor' });
          setView('admin');
          showToast('Welcome, Instructor', 'success');
          setIsLoggingIn(false);
          return;
        }

        const user = users.find(u => u.username === username && u.password === password);
        if (user) {
          fetchSheetData('logLogin', { username, password });
          
          // Cek apakah user memiliki pangkat instruktur
          const isInstructor = ['CCP', 'FI', 'GI'].includes(user.rank);
          
          setAppUser({ ...user, role: isInstructor ? 'instructor' : 'user' });
          setView(isInstructor ? 'admin' : 'user');
          showToast(`Welcome back, ${user.name}`, 'success');
        } else {
          showToast('Username atau password salah', 'error');
        }
        setIsLoggingIn(false);
      };

      return (
        <div className="max-w-md mx-auto mt-10 animate-fade-in-up">
          <div className="bg-white p-8 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.08)] border border-slate-100">
            <div className="text-center mb-8">
              <h2 className="text-2xl font-bold text-slate-800">Portal Login</h2>
              <p className="text-slate-500 mt-2 text-sm">Silakan masukkan kredensial Anda</p>
            </div>

            <form onSubmit={handleLogin} className="space-y-6">
              <div>
                <label className="block text-sm font-semibold text-slate-700 mb-2">Username</label>
                <input 
                  type="text" required
                  className="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-yellow-500 focus:border-yellow-500 outline-none transition-all bg-slate-50"
                  value={username} onChange={(e) => setUsername(e.target.value)}
                  placeholder="Masukkan username"
                />
              </div>
              <div>
                <label className="block text-sm font-semibold text-slate-700 mb-2">Password</label>
                <input 
                  type="password" required
                  className="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-yellow-500 focus:border-yellow-500 outline-none transition-all bg-slate-50"
                  value={password} onChange={(e) => setPassword(e.target.value)}
                  placeholder="••••••••"
                />
              </div>
              
              <button 
                type="submit" disabled={isLoggingIn}
                className="w-full bg-slate-900 text-white font-bold py-3 px-4 rounded-lg hover:bg-slate-800 transition-colors shadow-md hover:shadow-lg flex justify-center items-center gap-2 disabled:opacity-70"
              >
                {isLoggingIn ? 'Memeriksa...' : <>Masuk <Icon name="arrow-right" size={18} /></>}
              </button>
            </form>

            <div className="mt-8 pt-6 border-t border-slate-100 text-center">
              <p className="text-sm text-slate-600">
                Kru baru?{' '}
                <button onClick={() => setView('register')} className="text-blue-600 font-bold hover:underline">
                  Daftar di sini
                </button>
              </p>
            </div>
          </div>
        </div>
      );
    }

    function RegisterView({ setView, users, showToast, fetchSheetData, refreshData }) {
      const [formData, setFormData] = useState({ name: '', username: '', password: '', rank: RANKS[0], typeRating: TYPE_RATINGS[0], licenceNo: '' });
      const [isSubmitting, setIsSubmitting] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (users.some(u => u.username === formData.username)) {
          showToast('Username sudah digunakan', 'error');
          return;
        }

        setIsSubmitting(true);
        try {
          const payload = { ...formData, createdAt: new Date().toISOString() };
          await fetchSheetData('registerUser', payload);
          showToast('Registrasi berhasil! Silakan login.', 'success');
          refreshData(); 
          setView('login');
        } catch (error) {
          showToast('Terjadi kesalahan saat registrasi ke Spreadsheet', 'error');
        } finally {
          setIsSubmitting(false);
        }
      };

      return (
        <div className="max-w-xl mx-auto mt-6 animate-fade-in-up">
          <div className="bg-white p-8 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.08)] border border-slate-100 relative overflow-hidden">
            <div className="absolute top-0 left-0 w-full h-2 bg-yellow-500"></div>
            
            <div className="flex items-center gap-3 mb-6 pb-6 border-b border-slate-100">
              <div className="bg-blue-50 p-3 rounded-lg flex items-center justify-center">
                <Icon name="user-plus" size={24} className="text-blue-600" />
              </div>
              <div>
                <h2 className="text-2xl font-bold text-slate-800">Registrasi Kru</h2>
                <p className="text-slate-500 text-sm">Data akan tersimpan di Google Sheets</p>
              </div>
            </div>

            <form onSubmit={handleSubmit} className="space-y-5">
              <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div className="col-span-1 md:col-span-2">
                  <label className="block text-sm font-semibold text-slate-700 mb-1">Nama Lengkap</label>
                  <input type="text" required className="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50"
                    value={formData.name} onChange={(e) => setFormData({...formData, name: e.target.value})} placeholder="Cth: Budi Santoso" />
                </div>
                <div>
                  <label className="block text-sm font-semibold text-slate-700 mb-1">Username</label>
                  <input type="text" required className="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50"
                    value={formData.username} onChange={(e) => setFormData({...formData, username: e.target.value})} placeholder="Untuk login" />
                </div>
                <div>
                  <label className="block text-sm font-semibold text-slate-700 mb-1">Password</label>
                  <input type="password" required className="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50"
                    value={formData.password} onChange={(e) => setFormData({...formData, password: e.target.value})} />
                </div>
                <div>
                  <label className="block text-sm font-semibold text-slate-700 mb-1">Rank</label>
                  <select className="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50"
                    value={formData.rank} onChange={(e) => setFormData({...formData, rank: e.target.value})}>
                    {RANKS.map(r => <option key={r} value={r}>{r}</option>)}
                  </select>
                </div>
                <div>
                  <label className="block text-sm font-semibold text-slate-700 mb-1">Type Rating</label>
                  <select className="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50"
                    value={formData.typeRating} onChange={(e) => setFormData({...formData, typeRating: e.target.value})}>
                    {TYPE_RATINGS.map(t => <option key={t} value={t}>{t}</option>)}
                  </select>
                </div>
                <div className="col-span-1 md:col-span-2">
                  <label className="block text-sm font-semibold text-slate-700 mb-1">No. Licence</label>
                  <input type="text" required className="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50"
                    value={formData.licenceNo} onChange={(e) => setFormData({...formData, licenceNo: e.target.value})} placeholder="Cth: ATPL/ 20-0007" />
                </div>
              </div>
              
              <div className="flex gap-3 pt-4">
                <button type="button" onClick={() => setView('login')} className="flex-1 bg-white text-slate-700 font-bold py-3 px-4 rounded-lg border border-slate-300 hover:bg-slate-50 transition-colors">
                  Batal
                </button>
                <button type="submit" disabled={isSubmitting} className="flex-1 bg-blue-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-700 transition-colors shadow-md disabled:opacity-50 flex justify-center items-center gap-2">
                  {isSubmitting ? 'Menyimpan...' : <>Daftar <Icon name="database" size={16}/></>}
                </button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    function AdminDashboard({ appUser, users, questions, assignments, showToast, fetchSheetData, refreshData }) {
      const isAdmin = appUser?.role === 'admin';
      const [activeTab, setActiveTab] = useState(isAdmin ? 'users' : 'questions'); 

      return (
        <div className="flex flex-col md:flex-row gap-6">
          <div className="w-full md:w-64 shrink-0 space-y-4">
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden sticky top-6">
              <div className="p-4 bg-slate-50 border-b border-slate-200">
                <h3 className="font-bold text-slate-800 flex items-center gap-2">
                  <Icon name={isAdmin ? "book-open" : "chalkboard-user"} size={18} className="text-yellow-600"/>
                  Menu {isAdmin ? 'Admin' : 'Instructor'}
                </h3>
              </div>
              <div className="p-2 space-y-1">
                {isAdmin && (
                  <button onClick={() => setActiveTab('users')} className={`w-full text-left px-4 py-3 rounded-lg text-sm font-medium transition-colors flex items-center gap-3 ${activeTab === 'users' ? 'bg-slate-900 text-white' : 'text-slate-600 hover:bg-slate-100'}`}>
                    <Icon name="users" size={18} /> Daftar User & Assign
                  </button>
                )}
                <button onClick={() => setActiveTab('questions')} className={`w-full text-left px-4 py-3 rounded-lg text-sm font-medium transition-colors flex items-center gap-3 ${activeTab === 'questions' ? 'bg-slate-900 text-white' : 'text-slate-600 hover:bg-slate-100'}`}>
                  <Icon name="clipboard-list" size={18} /> Question Bank
                </button>
                <button onClick={() => setActiveTab('results')} className={`w-full text-left px-4 py-3 rounded-lg text-sm font-medium transition-colors flex items-center gap-3 ${activeTab === 'results' ? 'bg-slate-900 text-white' : 'text-slate-600 hover:bg-slate-100'}`}>
                  <Icon name="award" size={18} /> Hasil Ujian
                </button>
              </div>
            </div>

            <button onClick={refreshData} className="w-full bg-blue-100 text-blue-700 border border-blue-200 font-bold py-3 rounded-xl hover:bg-blue-200 transition-colors flex items-center justify-center gap-2 shadow-sm">
              <Icon name="database" size={16} /> Sync Spreadsheet
            </button>
          </div>

          <div className="flex-1">
            {activeTab === 'users' && isAdmin && <AdminUsers users={users} questions={questions} assignments={assignments} showToast={showToast} fetchSheetData={fetchSheetData} refreshData={refreshData} />}
            {activeTab === 'questions' && <AdminQuestions questions={questions} showToast={showToast} fetchSheetData={fetchSheetData} refreshData={refreshData} />}
            {activeTab === 'results' && <AdminResults assignments={assignments} users={users} />}
          </div>
        </div>
      );
    }

    function AdminUsers({ users, questions, assignments, showToast, fetchSheetData, refreshData }) {
      const [assignModal, setAssignModal] = useState({ show: false, user: null, typeExam: 'Initial', modelSoal: 'MODEL A' });
      const [editUserModal, setEditUserModal] = useState({ show: false, data: null });

      const handleAssignClick = (user) => {
        const existing = assignments.find(a => (a.userId === user.id || a.userId === user.username) && a.status === 'pending');
        if (existing) {
          showToast(`User ini sudah memiliki ujian aktif yang belum dikerjakan`, 'error');
          return;
        }
        setAssignModal({ show: true, user, typeExam: 'Initial', modelSoal: 'MODEL A' });
      };

      const submitAssign = async () => {
        const { user, typeExam, modelSoal } = assignModal;
        
        // Cek ketersediaan soal berdasarkan kombinasi Type Rating + Type Exam + Model Soal
        const examQuestions = questions.filter(q => 
          q.typeRating === user.typeRating && 
          q.typeExam === typeExam && 
          q.modelSoal === modelSoal
        );

        if (examQuestions.length === 0) {
          showToast(`Tidak ada soal untuk ${user.typeRating} - ${typeExam} - ${modelSoal}`, 'error');
          return;
        }

        try {
          const payload = {
            userId: user.id || user.username, 
            userName: user.name,
            typeRating: user.typeRating,
            typeExam: typeExam,
            modelSoal: modelSoal,
            status: 'pending',
            score: '',
            assignedAt: new Date().toISOString(),
            completedAt: ''
          };
          
          await fetchSheetData('addAssignment', payload);
          showToast(`Ujian ${typeExam} (${modelSoal}) berhasil ditugaskan ke ${user.name}`, 'success');
          setAssignModal({ show: false, user: null, typeExam: 'Initial', modelSoal: 'MODEL A' });
          refreshData();
        } catch (err) {
          showToast('Gagal menugaskan ujian', 'error');
        }
      };

      const handleDeleteUser = async (id) => {
        if (!window.confirm("Yakin ingin menghapus user ini?")) return;
        try {
          await fetchSheetData('deleteUser', { id });
          showToast('User berhasil dihapus', 'success');
          refreshData();
        } catch (err) { showToast('Gagal menghapus user', 'error'); }
      };

      const handleEditUserClick = (user) => {
        setEditUserModal({ show: true, data: { ...user } });
      };

      const submitUpdateUser = async (e) => {
        e.preventDefault();
        try {
          await fetchSheetData('updateUser', editUserModal.data);
          showToast('Data user berhasil diperbarui', 'success');
          setEditUserModal({ show: false, data: null });
          refreshData();
        } catch (err) {
          showToast('Gagal memperbarui data user', 'error');
        }
      };

      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 relative">
          <div className="p-6 border-b border-slate-200">
            <h2 className="text-xl font-bold text-slate-800">Manajemen User & Assignment</h2>
            <p className="text-slate-500 text-sm mt-1">Daftar kru terdaftar dari Google Sheets.</p>
          </div>
          <div className="overflow-x-auto">
            <table className="w-full text-left border-collapse">
              <thead>
                <tr className="bg-slate-50 text-slate-600 text-sm border-b border-slate-200">
                  <th className="p-4 font-semibold">Nama / Username</th>
                  <th className="p-4 font-semibold">Rank & Licence</th>
                  <th className="p-4 font-semibold text-center">Type Rating</th>
                  <th className="p-4 font-semibold text-right">Aksi</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-slate-100">
                {users.length === 0 ? (
                  <tr><td colSpan="4" className="p-8 text-center text-slate-500">Belum ada user terdaftar.</td></tr>
                ) : (
                  users.map((u, i) => (
                    <tr key={u.id || i} className="hover:bg-slate-50 transition-colors">
                      <td className="p-4">
                        <div className="font-semibold text-slate-800">{u.name}</div>
                        <div className="text-xs text-slate-500">@{u.username}</div>
                      </td>
                      <td className="p-4">
                        <div className="inline-block px-2 py-1 bg-slate-100 rounded text-xs font-bold text-slate-700 mb-1">{u.rank}</div>
                        <div className="text-xs text-slate-600">{u.licenceNo}</div>
                      </td>
                      <td className="p-4 text-center">
                        <span className="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-bold bg-blue-100 text-blue-800">
                          {u.typeRating}
                        </span>
                      </td>
                      <td className="p-4 text-right">
                        <div className="flex justify-end gap-2 items-center">
                          <button onClick={() => handleEditUserClick(u)} className="p-2 text-blue-600 hover:bg-blue-50 rounded-lg transition-colors" title="Edit User">
                            <Icon name="pen-to-square" size={14} />
                          </button>
                          <button onClick={() => handleDeleteUser(u.id)} className="p-2 text-red-600 hover:bg-red-50 rounded-lg transition-colors" title="Hapus User">
                            <Icon name="trash-can" size={14} />
                          </button>
                          <button onClick={() => handleAssignClick(u)} className="inline-flex items-center gap-1 bg-slate-900 text-white text-xs font-bold px-3 py-2 rounded shadow hover:bg-slate-800 transition-colors">
                            <Icon name="plus" size={14} /> Assign Exam
                          </button>
                        </div>
                      </td>
                    </tr>
                  ))
                )}
              </tbody>
            </table>
          </div>

          {/* Modal Assign Exam */}
          {assignModal.show && (
            <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-xl shadow-2xl w-full max-w-md p-6 animate-fade-in-up">
                <h3 className="font-bold text-lg text-slate-800 mb-2">Penugasan Ujian</h3>
                <p className="text-sm text-slate-600 mb-4">Tentukan jenis ujian untuk <b>{assignModal.user?.name}</b> ({assignModal.user?.typeRating})</p>
                
                <div className="space-y-4 mb-6">
                  <div>
                    <label className="block text-sm font-bold text-slate-700 mb-1">Type Exam</label>
                    <input list="examTypesList" className="w-full px-4 py-2 rounded-lg border border-slate-300 bg-slate-50"
                      value={assignModal.typeExam} onChange={e => setAssignModal({...assignModal, typeExam: e.target.value})} placeholder="Pilih/Ketik manual..." />
                  </div>
                  <div>
                    <label className="block text-sm font-bold text-slate-700 mb-1">Model Soal</label>
                    <input list="modelSoalsList" className="w-full px-4 py-2 rounded-lg border border-slate-300 bg-slate-50"
                      value={assignModal.modelSoal} onChange={e => setAssignModal({...assignModal, modelSoal: e.target.value})} placeholder="Pilih/Ketik manual..." />
                  </div>
                </div>

                <div className="flex gap-3 justify-end">
                  <button onClick={() => setAssignModal({ show: false, user: null, typeExam: 'Initial', modelSoal: 'MODEL A' })} className="px-4 py-2 rounded-lg font-bold text-slate-600 hover:bg-slate-100">Batal</button>
                  <button onClick={submitAssign} className="px-4 py-2 rounded-lg font-bold bg-blue-600 text-white hover:bg-blue-700 shadow-md flex items-center gap-2">
                    <Icon name="paper-plane" size={14}/> Tugaskan
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Modal Edit User */}
          {editUserModal.show && (
            <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-xl shadow-2xl w-full max-w-lg p-6 animate-fade-in-up">
                <div className="flex justify-between items-center mb-4 pb-3 border-b border-slate-100">
                  <h3 className="font-bold text-lg text-slate-800">Edit Data User</h3>
                  <button type="button" onClick={() => setEditUserModal({ show: false, data: null })} className="text-slate-400 hover:text-red-500 transition-colors">
                    <Icon name="xmark" size={20} />
                  </button>
                </div>
                
                <form onSubmit={submitUpdateUser} className="space-y-4">
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div className="col-span-1 md:col-span-2">
                      <label className="block text-sm font-semibold text-slate-700 mb-1">Nama Lengkap</label>
                      <input type="text" required className="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50"
                        value={editUserModal.data?.name || ''} onChange={(e) => setEditUserModal({ ...editUserModal, data: { ...editUserModal.data, name: e.target.value } })} />
                    </div>
                    <div>
                      <label className="block text-sm font-semibold text-slate-700 mb-1">Username</label>
                      <input type="text" required className="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50"
                        value={editUserModal.data?.username || ''} onChange={(e) => setEditUserModal({ ...editUserModal, data: { ...editUserModal.data, username: e.target.value } })} />
                    </div>
                    <div>
                      <label className="block text-sm font-semibold text-slate-700 mb-1">Password</label>
                      <input type="text" required className="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50"
                        value={editUserModal.data?.password || ''} onChange={(e) => setEditUserModal({ ...editUserModal, data: { ...editUserModal.data, password: e.target.value } })} />
                    </div>
                    <div>
                      <label className="block text-sm font-semibold text-slate-700 mb-1">Rank</label>
                      <select className="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50"
                        value={editUserModal.data?.rank || ''} onChange={(e) => setEditUserModal({ ...editUserModal, data: { ...editUserModal.data, rank: e.target.value } })}>
                        {RANKS.map(r => <option key={r} value={r}>{r}</option>)}
                      </select>
                    </div>
                    <div>
                      <label className="block text-sm font-semibold text-slate-700 mb-1">Type Rating</label>
                      <select className="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50"
                        value={editUserModal.data?.typeRating || ''} onChange={(e) => setEditUserModal({ ...editUserModal, data: { ...editUserModal.data, typeRating: e.target.value } })}>
                        {TYPE_RATINGS.map(t => <option key={t} value={t}>{t}</option>)}
                      </select>
                    </div>
                    <div className="col-span-1 md:col-span-2">
                      <label className="block text-sm font-semibold text-slate-700 mb-1">No. Licence</label>
                      <input type="text" required className="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50"
                        value={editUserModal.data?.licenceNo || ''} onChange={(e) => setEditUserModal({ ...editUserModal, data: { ...editUserModal.data, licenceNo: e.target.value } })} />
                    </div>
                  </div>
                  
                  <div className="flex gap-3 justify-end pt-4 border-t border-slate-100">
                    <button type="button" onClick={() => setEditUserModal({ show: false, data: null })} className="px-4 py-2 rounded-lg font-bold text-slate-600 hover:bg-slate-100 transition-colors">Batal</button>
                    <button type="submit" className="px-5 py-2 rounded-lg font-bold bg-blue-600 text-white hover:bg-blue-700 shadow-md flex items-center gap-2 transition-colors">
                      <Icon name="check" size={14}/> Simpan Perubahan
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    }

    function AdminQuestions({ questions, showToast, fetchSheetData, refreshData }) {
      const [showForm, setShowForm] = useState(false);
      const [showImport, setShowImport] = useState(false);
      const [isSaving, setIsSaving] = useState(false);
      const [isImporting, setIsImporting] = useState(false);
      const [importText, setImportText] = useState('');
      const [importTypeRating, setImportTypeRating] = useState(TYPE_RATINGS[0]);
      const [importExamType, setImportExamType] = useState('Initial');
      const [importModelSoal, setImportModelSoal] = useState('MODEL A');
      const [importProgress, setImportProgress] = useState({ current: 0, total: 0 });
      const [formData, setFormData] = useState({ typeRating: TYPE_RATINGS[0], typeExam: 'Initial', modelSoal: 'MODEL A', text: '', optA: '', optB: '', optC: '', optD: '', correctAnswer: 'A' });

      // State untuk grup & edit
      const [expandedGroup, setExpandedGroup] = useState(null);
      const [editingQId, setEditingQId] = useState(null);
      const [editFormData, setEditFormData] = useState(null);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setIsSaving(true);
        try {
          await fetchSheetData('addQuestion', { ...formData, createdAt: new Date().toISOString() });
          showToast('Soal berhasil ditambahkan', 'success');
          setFormData({ ...formData, text: '', optA: '', optB: '', optC: '', optD: '', correctAnswer: 'A' });
          setShowForm(false);
          refreshData();
        } catch (err) {
          showToast('Gagal menambah soal', 'error');
        } finally {
          setIsSaving(false);
        }
      };

      const handleDelete = async (id) => {
        if (!window.confirm("Yakin ingin menghapus soal ini?")) return;
        try {
          await fetchSheetData('deleteQuestion', { id });
          showToast('Soal dihapus', 'success');
          refreshData();
        } catch (err) { showToast('Gagal menghapus soal', 'error'); }
      };

      const handleDeleteAll = async () => {
        if (!window.confirm("PERINGATAN: Anda yakin ingin menghapus SEMUA soal di database? Tindakan ini tidak dapat dibatalkan!")) return;
        try {
          await fetchSheetData('deleteAllQuestions');
          showToast('Seluruh database soal berhasil dihapus', 'success');
          refreshData();
        } catch (err) { showToast('Gagal menghapus seluruh soal', 'error'); }
      };

      const handleDeleteGroup = async (group) => {
        if (!window.confirm(`Yakin ingin menghapus seluruh ${group.questions.length} soal pada grup ${group.title}?`)) return;
        try {
          await fetchSheetData('deleteQuestionGroup', {
            typeRating: group.typeRating,
            typeExam: group.typeExam,
            modelSoal: group.modelSoal
          });
          showToast(`Grup soal ${group.title} berhasil dihapus`, 'success');
          setExpandedGroup(null);
          refreshData();
        } catch (err) { showToast('Gagal menghapus grup soal', 'error'); }
      };

      const handleEditClick = (q) => {
        setEditingQId(q.id);
        setEditFormData({ ...q });
      };

      const handleUpdateSubmit = async (e) => {
        e.preventDefault();
        try {
          await fetchSheetData('updateQuestion', editFormData);
          showToast('Soal berhasil diperbarui', 'success');
          setEditingQId(null);
          refreshData();
        } catch (err) {
          showToast('Gagal memperbarui soal', 'error');
        }
      };

      const handleImport = async () => {
        const lines = importText.split('\n').map(l => l.trim()).filter(l => l !== '');
        if (lines.length === 0) return;

        setIsImporting(true);
        
        let successCount = 0;
        let errorCount = 0;
        let currentSection = 'General';
        let currentQ = {};
        let payloadBatch = [];

        for (let i = 0; i < lines.length; i++) {
          const line = lines[i];
          // Deteksi "1. Pertanyaan" (angka titik/kurung di awal akan dibuang)
          const qMatch = line.match(/^\d+[\.\)]\s*(.*)/); 
          // Deteksi "A. Opsi"
          const optMatch = line.match(/^([A-D])[\.\)]\s*(.*)/i);
          // Deteksi "Correct answer : C" atau "Jawaban : C"
          const ansMatch = line.match(/^(?:Correct\s+answer|Jawaban(?:\s+Benar)?|Kunci(?:\s+Jawaban)?)\s*[:\.]\s*([A-D])/i);

          if (ansMatch) {
            currentQ.correctAnswer = ansMatch[1].toUpperCase();
            if (currentQ.text && (currentQ.optA || currentQ.optB)) {
              payloadBatch.push({
                typeRating: importTypeRating,
                typeExam: importExamType,
                modelSoal: importModelSoal,
                section: currentSection,
                text: currentQ.text,
                optA: currentQ.optA || '',
                optB: currentQ.optB || '',
                optC: currentQ.optC || '',
                optD: currentQ.optD || '',
                correctAnswer: currentQ.correctAnswer,
                createdAt: new Date().toISOString()
              });
            } else {
              errorCount++;
            }
            currentQ = {}; 
          } else if (optMatch && currentQ.text) {
            const optLetter = optMatch[1].toUpperCase();
            currentQ[`opt${optLetter}`] = optMatch[2];
          } else if (qMatch) {
            currentQ.text = qMatch[1];
          } else {
            if (Object.keys(currentQ).length === 0) {
              currentSection = line;
            } else if (currentQ.text && !currentQ.optA) {
              currentQ.text += '\n' + line;
            }
          }
        }

        if (payloadBatch.length === 0) {
          setIsImporting(false);
          showToast('Format soal tidak dikenali, gagal import.', 'error');
          return;
        }

        setImportProgress({ current: 0, total: payloadBatch.length });
        
        for (let i = 0; i < payloadBatch.length; i++) {
          try {
            await fetchSheetData('addQuestion', payloadBatch[i]);
            successCount++;
          } catch(e) {
            errorCount++;
          }
          setImportProgress({ current: i + 1, total: payloadBatch.length });
        }

        setIsImporting(false);
        showToast(`Import selesai: ${successCount} berhasil, ${errorCount} gagal.`, successCount > 0 ? 'success' : 'error');
        if (successCount > 0) {
          setImportText('');
          setShowImport(false);
          refreshData();
        }
      };

      return (
        <div className="space-y-6">
          {/* Data List untuk Combobox (Dropdown + Manual Input) */}
          <datalist id="examTypesList">
            <option value="Initial" />
            <option value="Recurrent" />
            <option value="Upgrade Training" />
          </datalist>
          <datalist id="modelSoalsList">
            <option value="MODEL A" />
            <option value="MODEL B" />
            <option value="MODEL C" />
            <option value="MODEL D" />
          </datalist>

          <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
            <div>
              <h2 className="text-xl font-bold text-slate-800">Question Bank</h2>
              <p className="text-slate-500 text-sm mt-1">Kelola soal di Google Sheets.</p>
            </div>
            <div className="flex gap-2 w-full sm:w-auto">
              <button onClick={() => { setShowImport(!showImport); setShowForm(false); }} className={`flex-1 sm:flex-none px-4 py-2 rounded-lg font-bold text-sm transition-colors flex items-center justify-center gap-2 ${showImport ? 'bg-slate-200 text-slate-800' : 'bg-green-600 text-white hover:bg-green-700'}`}>
                <Icon name="file-import" size={16}/> Import
              </button>
              <button onClick={() => { setShowForm(!showForm); setShowImport(false); }} className={`flex-1 sm:flex-none px-4 py-2 rounded-lg font-bold text-sm transition-colors flex items-center justify-center gap-2 ${showForm ? 'bg-slate-200 text-slate-800' : 'bg-blue-600 text-white hover:bg-blue-700'}`}>
                <Icon name="plus" size={16}/> Tambah Soal
              </button>
            </div>
          </div>

          {showImport && (
            <div className="bg-white rounded-xl shadow-md border-l-4 border-l-green-500 p-6 animate-fade-in-up">
              <h3 className="font-bold text-lg mb-4 text-slate-800">Import Soal Otomatis</h3>
              
              <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4 bg-slate-50 p-4 rounded-lg border border-slate-200">
                <div>
                  <label className="block text-sm font-bold text-slate-700 mb-1">Type Rating</label>
                  <select className="w-full px-4 py-2 rounded-lg border border-slate-300 bg-white"
                    value={importTypeRating} onChange={e => setImportTypeRating(e.target.value)}>
                    {TYPE_RATINGS.map(t => <option key={t} value={t}>{t}</option>)}
                  </select>
                </div>
                <div>
                  <label className="block text-sm font-bold text-slate-700 mb-1">Type Exam</label>
                  <input list="examTypesList" className="w-full px-4 py-2 rounded-lg border border-slate-300 bg-white"
                    value={importExamType} onChange={e => setImportExamType(e.target.value)} placeholder="Pilih/Ketik manual..." />
                </div>
                <div>
                  <label className="block text-sm font-bold text-slate-700 mb-1">Model Soal</label>
                  <input list="modelSoalsList" className="w-full px-4 py-2 rounded-lg border border-slate-300 bg-white"
                    value={importModelSoal} onChange={e => setImportModelSoal(e.target.value)} placeholder="Pilih/Ketik manual..." />
                </div>
              </div>

              <div className="bg-slate-100 p-3 rounded-lg mb-4 text-xs font-mono overflow-x-auto whitespace-pre-wrap">
                <b>Contoh Format:</b><br/>
                AIRCRAFT GENERAL<br/>
                1. The main rotor system of the Bell 412EP is:<br/>
                A. Two-blade semi-rigid<br/>
                B. Three-blade rigid<br/>
                C. Four-blade composite soft-in-plane<br/>
                D. Five-blade rigid<br/>
                Correct answer : C
              </div>
              <textarea
                rows="8" disabled={isImporting}
                className="w-full px-4 py-3 rounded-lg border border-slate-300 bg-slate-50 font-mono text-sm focus:ring-2 focus:ring-green-500 outline-none"
                placeholder="AIRCRAFT GENERAL&#10;1. Pertanyaan pertama?&#10;A. Pilihan 1&#10;B. Pilihan 2&#10;Correct answer : A"
                value={importText}
                onChange={(e) => setImportText(e.target.value)}
              ></textarea>
              
              {importProgress.total > 0 && (
                <div className="mt-4">
                  <div className="flex justify-between text-xs font-bold mb-1 text-slate-700">
                    <span>Progres Import</span>
                    <span>{importProgress.current} / {importProgress.total}</span>
                  </div>
                  <div className="w-full bg-slate-200 rounded-full h-2.5">
                    <div className="bg-green-600 h-2.5 rounded-full transition-all duration-300" style={{width: `${(importProgress.current / importProgress.total) * 100}%`}}></div>
                  </div>
                </div>
              )}

              <div className="pt-4 flex justify-end gap-3">
                <button disabled={isImporting} onClick={() => setShowImport(false)} type="button" className="bg-white text-slate-700 font-bold py-2 px-4 rounded-lg border border-slate-300 hover:bg-slate-50 transition-colors">
                  Batal
                </button>
                <button disabled={isImporting || !importText.trim()} onClick={handleImport} className="bg-green-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-green-700 disabled:opacity-50 flex gap-2 items-center shadow-md">
                  {isImporting ? 'Memproses...' : <><Icon name="database" size={16}/> Mulai Import</>}
                </button>
              </div>
            </div>
          )}

          {showForm && (
            <div className="bg-white rounded-xl shadow-md border-l-4 border-l-blue-500 p-6 animate-fade-in-up">
              <h3 className="font-bold text-lg mb-4 text-slate-800">Buat Soal Baru</h3>
              <form onSubmit={handleSubmit} className="space-y-4">
                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                  <div>
                    <label className="block text-sm font-bold text-slate-700 mb-1">Type Rating</label>
                    <select className="w-full px-4 py-2 rounded-lg border border-slate-300 bg-slate-50"
                      value={formData.typeRating} onChange={e => setFormData({...formData, typeRating: e.target.value})}>
                      {TYPE_RATINGS.map(t => <option key={t} value={t}>{t}</option>)}
                    </select>
                  </div>
                  <div>
                    <label className="block text-sm font-bold text-slate-700 mb-1">Type Exam</label>
                    <input list="examTypesList" className="w-full px-4 py-2 rounded-lg border border-slate-300 bg-slate-50"
                      value={formData.typeExam} onChange={e => setFormData({...formData, typeExam: e.target.value})} placeholder="Pilih/Ketik manual..." />
                  </div>
                  <div>
                    <label className="block text-sm font-bold text-slate-700 mb-1">Model Soal</label>
                    <input list="modelSoalsList" className="w-full px-4 py-2 rounded-lg border border-slate-300 bg-slate-50"
                      value={formData.modelSoal} onChange={e => setFormData({...formData, modelSoal: e.target.value})} placeholder="Pilih/Ketik manual..." />
                  </div>
                </div>
                <div>
                  <label className="block text-sm font-bold text-slate-700 mb-1">Pertanyaan</label>
                  <textarea required rows="3" className="w-full px-4 py-2 rounded-lg border border-slate-300 bg-slate-50"
                    value={formData.text} onChange={e => setFormData({...formData, text: e.target.value})} />
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  {['A', 'B', 'C', 'D'].map((opt) => (
                    <div key={opt}>
                      <label className="block text-xs font-bold text-slate-700 mb-1">Opsi {opt}</label>
                      <input type="text" required className="w-full px-3 py-2 rounded-lg border border-slate-300 bg-slate-50"
                        value={formData[`opt${opt}`]} onChange={e => setFormData({...formData, [`opt${opt}`]: e.target.value})} />
                    </div>
                  ))}
                </div>
                <div>
                  <label className="block text-sm font-bold text-slate-700 mb-1">Jawaban Benar</label>
                  <div className="flex gap-4">
                    {['A', 'B', 'C', 'D'].map((opt) => (
                      <label key={opt} className="flex items-center gap-2 cursor-pointer">
                        <input type="radio" name="correctAnswer" value={opt} checked={formData.correctAnswer === opt}
                          onChange={e => setFormData({...formData, correctAnswer: e.target.value})} className="w-4 h-4 text-blue-600" />
                        <span className="font-bold text-slate-700">{opt}</span>
                      </label>
                    ))}
                  </div>
                </div>
                <div className="pt-4 flex justify-end">
                  <button disabled={isSaving} type="submit" className="bg-slate-900 text-white px-6 py-2 rounded-lg font-bold hover:bg-slate-800 disabled:opacity-50 flex gap-2 items-center">
                    {isSaving ? 'Menyimpan...' : <><Icon name="database" size={16}/> Simpan Soal</>}
                  </button>
                </div>
              </form>
            </div>
          )}

          <div className="space-y-4">
            {questions.length > 0 && (
              <div className="flex justify-end mb-2 animate-fade-in-up">
                <button onClick={handleDeleteAll} className="text-xs font-bold bg-red-100 text-red-600 hover:bg-red-200 px-4 py-2 rounded-lg transition-colors flex items-center gap-2 shadow-sm border border-red-200">
                  <Icon name="trash-can" size={14}/> Hapus Seluruh Database Soal
                </button>
              </div>
            )}
            {(() => {
              // 1. Mengelompokkan Soal
              const groupedQuestions = {};
              questions.forEach(q => {
                const tr = q.typeRating || 'Unknown';
                const te = q.typeExam || 'Initial';
                const ms = q.modelSoal || 'MODEL A';
                const key = `${tr}|${te}|${ms}`;
                
                if (!groupedQuestions[key]) {
                  groupedQuestions[key] = {
                    title: `${te} ${tr} - ${ms}`,
                    typeRating: tr,
                    typeExam: te,
                    modelSoal: ms,
                    questions: []
                  };
                }
                groupedQuestions[key].questions.push(q);
              });

              const groupedKeys = Object.keys(groupedQuestions);

              if (groupedKeys.length === 0) {
                return (
                  <div className="text-center p-8 bg-white rounded-xl shadow-sm border border-slate-200 text-slate-500">
                    Belum ada soal tersimpan di Question Bank.
                  </div>
                );
              }

              // 2. Menampilkan List Grup
              return groupedKeys.map(key => {
                const group = groupedQuestions[key];
                const isExpanded = expandedGroup === key;

                return (
                  <div key={key} className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                    {/* Header Grup (Dapat di-klik) */}
                    <div 
                      className="bg-slate-50 hover:bg-slate-100 px-6 py-4 cursor-pointer flex justify-between items-center transition-colors border-b border-transparent"
                      onClick={() => setExpandedGroup(isExpanded ? null : key)}
                    >
                      <div className="flex items-center gap-4">
                        <div className={`transition-transform duration-200 ${isExpanded ? 'rotate-90 text-blue-600' : 'text-slate-400'}`}>
                          <Icon name="chevron-right" />
                        </div>
                        <div>
                          <h4 className="font-bold text-slate-800 text-lg uppercase tracking-wide">
                            {group.title}
                          </h4>
                        </div>
                      </div>
                      <span className="text-xs font-bold bg-blue-100 text-blue-700 px-3 py-1 rounded-full shadow-sm">
                        {group.questions.length} Soal
                      </span>
                    </div>

                    {/* Konten Soal (Expanded) */}
                    {isExpanded && (
                      <div className="divide-y divide-slate-100 border-t border-slate-200 bg-white">
                        <div className="bg-red-50/50 px-6 py-3 flex justify-between items-center border-b border-red-100">
                          <span className="text-xs text-slate-500 font-semibold">Kelola Grup ini:</span>
                          <button onClick={() => handleDeleteGroup(group)} className="text-xs font-bold bg-red-500 text-white hover:bg-red-600 px-3 py-1.5 rounded shadow-sm transition-colors flex items-center gap-1">

                          <div key={q.id || idx} className="p-6 hover:bg-slate-50 transition-colors">
                            
                            {editingQId === q.id ? (
                              /* --- FORM EDIT SOAL --- */
                              <form onSubmit={handleUpdateSubmit} className="bg-white p-5 rounded-lg border border-blue-300 shadow-md space-y-4 animate-fade-in-up">
                                <div className="flex justify-between items-center mb-2 border-b border-slate-100 pb-2">
                                  <h4 className="font-bold text-blue-700 flex items-center gap-2">
                                    <Icon name="pen-to-square" size={16}/> Edit Soal #{idx + 1}
                                  </h4>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                  <div className="col-span-full">
                                    <label className="block text-xs font-bold text-slate-700 mb-1">Section (Opsional, cth: AIRCRAFT GENERAL)</label>
                                    <input type="text" className="w-full px-3 py-2 rounded-md border border-slate-300 bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none"
                                      value={editFormData.section || ''} onChange={e => setEditFormData({...editFormData, section: e.target.value})} />
                                  </div>
                                  <div className="col-span-full">
                                    <label className="block text-xs font-bold text-slate-700 mb-1">Pertanyaan</label>
                                    <textarea rows="3" required className="w-full px-3 py-2 rounded-md border border-slate-300 bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none"
                                      value={editFormData.text} onChange={e => setEditFormData({...editFormData, text: e.target.value})} />
                                  </div>
                                  {['A', 'B', 'C', 'D'].map((opt) => (
                                    <div key={opt}>
                                      <label className="block text-xs font-bold text-slate-700 mb-1">Opsi {opt}</label>
                                      <input type="text" required className="w-full px-3 py-2 rounded-md border border-slate-300 bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none"
                                        value={editFormData[`opt${opt}`]} onChange={e => setEditFormData({...editFormData, [`opt${opt}`]: e.target.value})} />
                                    </div>
                                  ))}
                                  <div className="col-span-full">
                                    <label className="block text-xs font-bold text-slate-700 mb-1">Jawaban Benar</label>
                                    <div className="flex gap-4">
                                      {['A', 'B', 'C', 'D'].map((opt) => (
                                        <label key={`editAns-${opt}`} className="flex items-center gap-2 cursor-pointer">
                                          <input type="radio" name={`editAns-${q.id}`} value={opt} checked={editFormData.correctAnswer?.trim().toUpperCase() === opt}
                                            onChange={e => setEditFormData({...editFormData, correctAnswer: e.target.value})} className="w-4 h-4 text-blue-600" />
                                          <span className="font-bold text-slate-700">{opt}</span>
                                        </label>
                                      ))}
                                    </div>
                                  </div>
                                </div>
                                <div className="flex justify-end gap-3 pt-4 border-t border-slate-100">
                                  <button type="button" onClick={() => setEditingQId(null)} className="px-4 py-2 text-sm font-bold text-slate-600 border border-slate-300 bg-white hover:bg-slate-50 rounded-lg transition-colors">Batal</button>
                                  <button type="submit" className="px-5 py-2 text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 rounded-lg shadow-sm flex items-center gap-2">
                                    <Icon name="check" size={14}/> Simpan Perubahan
                                  </button>
                                </div>
                              </form>
                            ) : (
                              /* --- MODE VIEW SOAL --- */
                              <div className="flex gap-4">
                                <div className="font-bold text-slate-400 mt-1">{idx + 1}.</div>
                                <div className="flex-1">
                                  {q.section && q.section !== 'General' && (
                                    <span className="text-[10px] font-bold text-blue-600 bg-blue-100 px-2 py-0.5 rounded uppercase tracking-wider inline-block mb-3 shadow-sm border border-blue-200">
                                      {q.section}
                                    </span>
                                  )}
                                  <p className="font-semibold text-slate-800 mb-4 whitespace-pre-wrap">{q.text}</p>
                                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-x-6 gap-y-3 text-sm text-slate-600">
                                    <div className={`p-3 rounded-lg border-2 ${q.correctAnswer?.trim().toUpperCase() === 'A' ? 'border-green-500 bg-green-50 text-green-700 font-bold' : 'border-slate-100 bg-white'}`}>A. {q.optA}</div>
                                    <div className={`p-3 rounded-lg border-2 ${q.correctAnswer?.trim().toUpperCase() === 'B' ? 'border-green-500 bg-green-50 text-green-700 font-bold' : 'border-slate-100 bg-white'}`}>B. {q.optB}</div>
                                    <div className={`p-3 rounded-lg border-2 ${q.correctAnswer?.trim().toUpperCase() === 'C' ? 'border-green-500 bg-green-50 text-green-700 font-bold' : 'border-slate-100 bg-white'}`}>C. {q.optC}</div>
                                    <div className={`p-3 rounded-lg border-2 ${q.correctAnswer?.trim().toUpperCase() === 'D' ? 'border-green-500 bg-green-50 text-green-700 font-bold' : 'border-slate-100 bg-white'}`}>D. {q.optD}</div>
                                  </div>
                                </div>
                                <div className="flex flex-col gap-2 shrink-0 border-l border-slate-100 pl-4 ml-2">
                                  <button onClick={(e) => { e.stopPropagation(); handleEditClick(q); }} className="text-blue-500 hover:bg-blue-100 hover:text-blue-700 p-2.5 rounded-lg transition-colors flex items-center justify-center bg-blue-50" title="Edit Soal">
                                    <Icon name="pen-to-square" size={16} />
                                  </button>
                                  <button onClick={(e) => { e.stopPropagation(); handleDelete(q.id); }} className="text-red-500 hover:bg-red-100 hover:text-red-700 p-2.5 rounded-lg transition-colors flex items-center justify-center bg-red-50" title="Hapus Soal">
                                    <Icon name="trash-can" size={16} />
                                  </button>
                                </div>
                              </div>
                            )}
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                );
              });
            })()}
          </div>
        </div>
      );
    }

        <div className="bg-white rounded-xl shadow-sm border border-slate-200">

                      <td className="p-4 font-semibold text-slate-800">{a.userName}</td>
                      <td className="p-4">
                        <span className="inline-flex items-center px-2 py-0.5 rounded text-xs font-bold bg-blue-100 text-blue-800 mb-1">{a.typeRating}</span><br/>
                        <span className="text-[10px] text-slate-500 font-bold uppercase">{a.typeExam || 'Ujian'} - {a.modelSoal || 'Umum'}</span>
                      </td>
                      <td className="p-4 text-sm text-slate-600">{a.completedAt ? new Date(a.completedAt).toLocaleDateString('id-ID', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit' }) : '-'}</td>

      );

    function UserDashboard({ appUser, assignments, setView }) {

            <div className="absolute right-[-20px] top-[-20px] opacity-10">
              <Icon name="plane-departure" size={180} />
            </div>
            <div className="relative z-10 flex flex-col md:flex-row md:items-center gap-6">

              <div>

                <div className="flex flex-wrap gap-3 mt-2">

                  <span className="bg-slate-800 px-3 py-1 rounded-full text-xs font-medium border border-slate-700">Licence: <span className="text-white font-bold">{appUser.licenceNo}</span></span>
                  <span className="bg-slate-800 px-3 py-1 rounded-full text-xs font-medium border border-slate-700">Rating: <span className="text-blue-400 font-bold">{appUser.typeRating}</span></span>

          <div>

              <div className="grid gap-4 md:grid-cols-2">

                    <div className="flex justify-between items-start mb-4">
                      <div>

          <div>
            <h3 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">

                  </tr>

                <tbody className="divide-y divide-slate-100">
                  {completed.length === 0 ? (
                    <tr><td colSpan="3" className="p-8 text-center text-slate-500">Belum ada riwayat ujian.</td></tr>
                  ) : (
                    completed.map((a, i) => (
                      <tr key={a.id || i}>
                        <td className="p-4 font-semibold text-slate-800">
                          {a.typeRating} - {a.typeExam}

                          <span className={`inline-block px-3 py-1 rounded-full text-sm font-bold ${Number(a.score) >= 80 ? 'bg-green-100 text-green-700' : Number(a.score) >= 60 ? 'bg-yellow-100 text-yellow-700' : 'bg-red-100 text-red-700'}`}>

                  )}
                </tbody>
              </table>
            </div>
          </div>
